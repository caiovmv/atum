apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: atum
  labels:
    app.kubernetes.io/name: api
    app.kubernetes.io/component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api
        app.kubernetes.io/component: backend
    spec:
      securityContext:
        runAsUser: 0  # entrypoint-api.sh requer root para chown; ajustar se possível
      initContainers:
        - name: wait-postgres
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - |
              until pg_isready -h postgres.atum.svc.cluster.local -p 5432; do
                echo "Aguardando Postgres..."
                sleep 2
              done
        - name: wait-redis
          image: redis:7-alpine
          command:
            - sh
            - -c
            - |
              until redis-cli -h redis.atum.svc.cluster.local ping | grep -q PONG; do
                echo "Aguardando Redis..."
                sleep 2
              done
      containers:
        - name: api
          image: ghcr.io/caiovmv/atum-api:latest
          command: ["/app/docker/entrypoint-api.sh"]
          args: ["uvicorn", "app.web.app:app", "--host", "0.0.0.0", "--port", "8000"]
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: atum-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: atum-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: atum-secrets
                  key: REDIS_URL
            - name: TMDB_API_KEY
              valueFrom:
                secretKeyRef:
                  name: atum-secrets
                  key: TMDB_API_KEY
            - name: BASIC_AUTH_USER
              valueFrom:
                secretKeyRef:
                  name: atum-secrets
                  key: BASIC_AUTH_USER
            - name: BASIC_AUTH_PASS
              valueFrom:
                secretKeyRef:
                  name: atum-secrets
                  key: BASIC_AUTH_PASS
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: atum-secrets
                  key: JWT_SECRET
            - name: ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: atum-secrets
                  key: ADMIN_EMAIL
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: atum-secrets
                  key: ADMIN_PASSWORD
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: atum-secrets
                  key: STRIPE_SECRET_KEY
            - name: STRIPE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: atum-secrets
                  key: STRIPE_WEBHOOK_SECRET
            - name: STRIPE_PUBLISHABLE_KEY
              valueFrom:
                secretKeyRef:
                  name: atum-secrets
                  key: STRIPE_PUBLISHABLE_KEY
            - name: LASTFM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: atum-secrets
                  key: LASTFM_API_KEY
            - name: TMDB_READ_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: atum-secrets
                  key: TMDB_READ_ACCESS_TOKEN
          startupProbe:
            httpGet:
              path: /api/indexers/status
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /api/indexers/status
              port: 8000
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/indexers/status
              port: 8000
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          volumeMounts:
            - name: covers
              mountPath: /app/covers
            - name: library
              mountPath: /library/music
              subPath: music
            - name: library
              mountPath: /library/videos
              subPath: videos
            - name: library
              mountPath: /library/series
              subPath: series
            - name: library
              mountPath: /library/concerts
              subPath: concerts
            - name: hls-cache
              mountPath: /app/hls_cache
          securityContext:
            capabilities:
              add: ["SYS_PTRACE"]
      volumes:
        - name: covers
          persistentVolumeClaim:
            claimName: api-covers
        - name: library
          persistentVolumeClaim:
            claimName: library
        - name: hls-cache
          persistentVolumeClaim:
            claimName: hls-cache
