apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: atum
  labels:
    app.kubernetes.io/name: api
    app.kubernetes.io/component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api
        app.kubernetes.io/component: backend
    spec:
      securityContext:
        runAsUser: 0  # entrypoint-api.sh requer root para chown; ajustar se possível
      containers:
        - name: api
          image: ghcr.io/caiovmv/atum-api:latest
          command: ["/app/docker/entrypoint-api.sh"]
          args: ["uvicorn", "app.web.app:app", "--host", "0.0.0.0", "--port", "8000"]
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: atum-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: atum-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: atum-secrets
                  key: REDIS_URL
            - name: TMDB_API_KEY
              valueFrom:
                secretKeyRef:
                  name: atum-secrets
                  key: TMDB_API_KEY
            - name: BASIC_AUTH_USER
              valueFrom:
                secretKeyRef:
                  name: atum-secrets
                  key: BASIC_AUTH_USER
            - name: BASIC_AUTH_PASS
              valueFrom:
                secretKeyRef:
                  name: atum-secrets
                  key: BASIC_AUTH_PASS
          livenessProbe:
            httpGet:
              path: /api/indexers/status
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/indexers/status
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          volumeMounts:
            - name: covers
              mountPath: /app/covers
            - name: library
              mountPath: /library/music
              subPath: music
            - name: library
              mountPath: /library/videos
              subPath: videos
            - name: library
              mountPath: /library/series
              subPath: series
            - name: library
              mountPath: /library/concerts
              subPath: concerts
          securityContext:
            capabilities:
              add: ["SYS_PTRACE"]
      volumes:
        - name: covers
          persistentVolumeClaim:
            claimName: api-covers
        - name: library
          persistentVolumeClaim:
            claimName: library
