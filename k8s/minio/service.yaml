apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: atum
spec:
  selector:
    app: minio
  ports:
    - name: api
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
---
# Acesso ao console MinIO via admin.loombeat.com/minio-console (protegido por backoffice_role)
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: minio-console
  namespace: atum
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`admin.loombeat.com`) && PathPrefix(`/minio`)
      kind: Rule
      services:
        - name: minio
          port: 9001
      middlewares:
        - name: security-headers
          namespace: atum
