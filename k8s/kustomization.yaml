apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: atum

resources:
  # Base
  - namespace.yaml
  - configmap.yaml
  - shared-pvcs.yaml

  # Infrastructure
  - postgres/pvc.yaml
  - postgres/statefulset.yaml
  - postgres/service.yaml
  - redis/pvc.yaml
  - redis/statefulset.yaml
  - redis/service.yaml

  # Core services
  - api/deployment.yaml
  - api/service.yaml
  - runner/deployment.yaml
  - runner/service.yaml

  # Frontend
  - traefik-security-headers.yaml
  - frontend/nginx-k8s-configmap.yaml
  - frontend/deployment.yaml
  - frontend/service.yaml
  - frontend/traefik-service.yaml
  - frontend/ingress.yaml

  # Daemons
  - daemons/feed-daemon.yaml
  - daemons/sync-daemon.yaml
  - daemons/indexers-daemon.yaml
  - enrichment/deployment.yaml

  # Optional services
  - flaresolverr/deployment.yaml
  - flaresolverr/service.yaml

# Controle de versão das imagens — o job de deploy atualiza estas tags via:
#   kustomize edit set image ghcr.io/caiovmv/atum-api:v1.2.3
images:
  - name: ghcr.io/caiovmv/atum-api
    newTag: latest
  - name: ghcr.io/caiovmv/atum-runner
    newTag: latest
  - name: ghcr.io/caiovmv/atum-frontend
    newTag: latest
  - name: ghcr.io/caiovmv/atum-enrichment
    newTag: latest
