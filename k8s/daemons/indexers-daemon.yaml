apiVersion: apps/v1
kind: Deployment
metadata:
  name: indexers-daemon
  namespace: atum
  labels:
    app.kubernetes.io/name: indexers-daemon
    app.kubernetes.io/component: daemon
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: indexers-daemon
  template:
    metadata:
      labels:
        app.kubernetes.io/name: indexers-daemon
        app.kubernetes.io/component: daemon
    spec:
      containers:
        - name: indexers-daemon
          image: ghcr.io/caiovmv/atum-api:latest
          command: ["dl-torrent", "indexers", "daemon", "--interval", "300"]
          envFrom:
            - configMapRef:
                name: atum-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: atum-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: atum-secrets
                  key: REDIS_URL
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          securityContext:
            capabilities:
              add: ["SYS_PTRACE"]
