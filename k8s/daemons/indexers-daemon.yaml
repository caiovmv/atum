apiVersion: apps/v1
kind: Deployment
metadata:
  name: indexers-daemon
  namespace: atum
  labels:
    app.kubernetes.io/name: indexers-daemon
    app.kubernetes.io/component: daemon
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: indexers-daemon
  template:
    metadata:
      labels:
        app.kubernetes.io/name: indexers-daemon
        app.kubernetes.io/component: daemon
    spec:
      initContainers:
        - name: wait-postgres
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - |
              until pg_isready -h postgres.atum.svc.cluster.local -p 5432; do
                echo "Aguardando Postgres..."
                sleep 2
              done
        - name: wait-redis
          image: redis:7-alpine
          command:
            - sh
            - -c
            - |
              until redis-cli -h redis.atum.svc.cluster.local ping | grep -q PONG; do
                echo "Aguardando Redis..."
                sleep 2
              done
      containers:
        - name: indexers-daemon
          image: ghcr.io/caiovmv/atum-api:latest
          command: ["dl-torrent", "indexers", "daemon", "--interval", "300"]
          envFrom:
            - configMapRef:
                name: atum-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: atum-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: atum-secrets
                  key: REDIS_URL
          livenessProbe:
            exec:
              command: ["pgrep", "-f", "indexers daemon"]
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["pgrep", "-f", "indexers daemon"]
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          securityContext:
            capabilities:
              add: ["SYS_PTRACE"]
