# Dashboard do Traefik acessível em https://traefik.loombeat.com
# Protegido por HTTP Basic Auth.
# Cloudflare Tunnel faz o SSL — Traefik recebe HTTP puro na porta 80.
#
# PASSO 1 — Criar o Secret com as credenciais (PowerShell):
#
#   $USER = "admin"
#   $PASSWORD = "sua-senha-aqui"
#   $HASH = kubectl run htpasswd-gen --rm -i --restart=Never --image=httpd:alpine -- htpasswd -nb $USER $PASSWORD 2>$null
#   kubectl create secret generic traefik-dashboard-auth --from-literal=users="$HASH" -n atum
#
# PASSO 2 — Aplicar este arquivo:
#   kubectl apply -f k8s/traefik-dashboard.yaml
#
# PASSO 3 — Garantir que traefik-letsencrypt.yaml foi aplicado (api.dashboard: true).
---
# Middleware: BasicAuth lendo as credenciais do Secret
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: traefik-dashboard-auth
  namespace: atum
spec:
  basicAuth:
    secret: traefik-dashboard-auth
---
# IngressRoute para o dashboard via Cloudflare Tunnel (HTTP na porta 80)
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: traefik-dashboard
  namespace: atum
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`traefik.loombeat.com`)
      kind: Rule
      middlewares:
        - name: traefik-dashboard-auth
      services:
        - name: api@internal
          kind: TraefikService
