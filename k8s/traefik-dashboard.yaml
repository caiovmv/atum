# Dashboard do Traefik acessível em https://traefik.loombeat.com
# Protegido por HTTP Basic Auth.
#
# PASSO 1 — Gerar o hash htpasswd e criar o Secret no cluster:
#
#   # Substitua USER e PASSWORD pelos seus valores
#   kubectl create secret generic traefik-dashboard-auth \
#     --from-literal=users="$(htpasswd -nb USER PASSWORD)" \
#     -n atum
#
#   # Alternativa sem htpasswd instalado (usa openssl):
#   kubectl create secret generic traefik-dashboard-auth \
#     --from-literal=users="USER:$(openssl passwd -apr1 PASSWORD)" \
#     -n atum
#
# PASSO 2 — Aplicar este arquivo:
#
#   kubectl apply -f k8s/traefik-dashboard.yaml
#
# PASSO 3 — Garantir que traefik-letsencrypt.yaml já foi aplicado
#   (necessário para o certResolver letsencrypt e api.dashboard: true).
---
# Middleware: BasicAuth lendo as credenciais do Secret
apiVersion: traefik.containo.us/v1alpha1
kind: Middleware
metadata:
  name: traefik-dashboard-auth
  namespace: atum
spec:
  basicAuth:
    secret: traefik-dashboard-auth
---
# IngressRoute HTTPS para o dashboard
apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
  name: traefik-dashboard
  namespace: atum
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`traefik.loombeat.com`)
      kind: Rule
      middlewares:
        - name: traefik-dashboard-auth
      services:
        - name: api@internal
          kind: TraefikService
  tls:
    certResolver: letsencrypt
---
# Redirect HTTP → HTTPS também para o dashboard
apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
  name: traefik-dashboard-http
  namespace: atum
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`traefik.loombeat.com`)
      kind: Rule
      middlewares:
        - name: redirect-https
      services:
        - name: frontend
          port: 80
