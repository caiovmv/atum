# Configuração do Traefik via K3s HelmChartConfig.
#
# APLICAR MANUALMENTE UMA VEZ NO CLUSTER (não está no kustomization.yaml
# porque este recurso fica em kube-system, fora do namespace atum):
#
#   kubectl apply -f k8s/traefik-letsencrypt.yaml
#
# Após aplicar, o K3s reinicia o Traefik automaticamente.
# O arquivo acme.json (certificados) é persistido no volume do Traefik.
#
# Pré-requisito: domínios devem resolver para o IP do nó K3s
# e as portas 80 e 443 devem estar acessíveis pela internet.
apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: traefik
  namespace: kube-system
spec:
  valuesContent: |-
    # Let's Encrypt
    additionalArguments:
      - "--certificatesresolvers.letsencrypt.acme.email=admin@loombeat.com"
      - "--certificatesresolvers.letsencrypt.acme.storage=/data/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"

    # Dashboard habilitado (protegido por IngressRoute + BasicAuth — ver traefik-dashboard.yaml)
    api:
      dashboard: true

    persistence:
      enabled: true
      size: 128Mi

    ports:
      web:
        expose:
          default: true
        # Desabilitar redirect global web→websecure — Cloudflare Tunnel já entrega HTTP
        # e o redirect causaria loop infinito (Cloudflare segue o redirect de volta ao túnel)
        redirectTo: {}
      websecure:
        expose:
          default: true
