# Traefik IngressRoute para atum.loombeat.com
#
# Compatível com Traefik v2 (K3s stable usa traefik.containo.us/v1alpha1).
# Se o seu K3s usar Traefik v3, troque o apiVersion para traefik.io/v1alpha1.
# Verificar: kubectl get crd | grep traefik
---
# Middleware: redireciona HTTP → HTTPS permanentemente
apiVersion: traefik.containo.us/v1alpha1
kind: Middleware
metadata:
  name: redirect-https
  namespace: atum
spec:
  redirectScheme:
    scheme: https
    permanent: true
---
# IngressRoute HTTP: apenas redireciona para HTTPS
apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
  name: frontend-http
  namespace: atum
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`atum.loombeat.com`)
      kind: Rule
      middlewares:
        - name: redirect-https
      services:
        - name: frontend
          port: 80
---
# IngressRoute HTTPS: serve o frontend com TLS via Let's Encrypt
apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
  name: frontend-https
  namespace: atum
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`atum.loombeat.com`)
      kind: Rule
      services:
        - name: frontend
          port: 80
  tls:
    certResolver: letsencrypt
