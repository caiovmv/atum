# Traefik IngressRoute para atum.loombeat.com
#
# Cloudflare Tunnel faz o SSL offloading — Traefik recebe HTTP puro na porta 80.
# Não é necessário Let's Encrypt nem redirect HTTPS neste lado.
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: frontend
  namespace: atum
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`atum.loombeat.com`)
      kind: Rule
      services:
        - name: frontend
          port: 80
