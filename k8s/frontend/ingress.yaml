# Middleware: redireciona HTTP → HTTPS permanentemente
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-https
  namespace: atum
spec:
  redirectScheme:
    scheme: https
    permanent: true
---
# IngressRoute HTTP: apenas redireciona para HTTPS
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: frontend-http
  namespace: atum
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`atum.loombeat.com`)
      kind: Rule
      middlewares:
        - name: redirect-https
      services:
        - name: frontend
          port: 80
---
# IngressRoute HTTPS: serve o frontend com TLS via Let's Encrypt
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: frontend-https
  namespace: atum
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`atum.loombeat.com`)
      kind: Rule
      services:
        - name: frontend
          port: 80
  tls:
    certResolver: letsencrypt
