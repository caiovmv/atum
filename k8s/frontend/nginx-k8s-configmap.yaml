apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-nginx-config
  namespace: atum
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/component: web
data:
  default.conf: |
    server {
        listen 80;
        server_name _;

        server_tokens off;

        root /usr/share/nginx/html;
        index index.html;

        gzip on;
        gzip_vary on;
        gzip_proxied any;
        gzip_comp_level 5;
        gzip_min_length 256;
        gzip_types
            text/plain
            text/css
            text/javascript
            application/javascript
            application/json
            application/xml
            image/svg+xml
            application/manifest+json
            text/event-stream;

        client_max_body_size 10m;

        # Security headers no bloco server cobrem locations sem add_header próprio (ex: /api/)
        include /etc/nginx/conf.d/security-headers.conf;

        # Proxy para a API — sem buffering para suportar SSE
        location /api/ {
            include /etc/nginx/conf.d/api-auth-headers.conf;
            proxy_pass http://api.atum.svc.cluster.local:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # Repassa o protocolo original (Traefik seta X-Forwarded-Proto: https)
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_connect_timeout 60s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
        }

        location /assets/ {
            include /etc/nginx/conf.d/security-headers.conf;
            add_header Cache-Control "public, max-age=31536000, immutable";
            try_files $uri =404;
        }

        location ~* \.(svg|woff2|ico|webmanifest)$ {
            include /etc/nginx/conf.d/security-headers.conf;
            add_header Cache-Control "public, max-age=31536000, immutable";
            try_files $uri =404;
        }

        location = /sw.js {
            include /etc/nginx/conf.d/security-headers.conf;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            try_files $uri =404;
        }

        location /.well-known/ {
            include /etc/nginx/conf.d/security-headers.conf;
            add_header Cache-Control "public, max-age=3600";
            try_files $uri =404;
        }

        location / {
            try_files $uri $uri/ /index.html;
            include /etc/nginx/conf.d/security-headers.conf;
            add_header Cache-Control "no-cache";
        }
    }
