apiVersion: apps/v1
kind: Deployment
metadata:
  name: enrichment-daemon
  namespace: atum
  labels:
    app.kubernetes.io/name: enrichment-daemon
    app.kubernetes.io/component: daemon
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: enrichment-daemon
  template:
    metadata:
      labels:
        app.kubernetes.io/name: enrichment-daemon
        app.kubernetes.io/component: daemon
    spec:
      containers:
        - name: enrichment-daemon
          image: ghcr.io/caiovmv/atum-enrichment:latest
          command: ["dl-torrent", "enrichment", "daemon", "--interval", "300", "--batch-size", "10"]
          envFrom:
            - configMapRef:
                name: atum-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: atum-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: atum-secrets
                  key: REDIS_URL
            - name: TMDB_API_KEY
              valueFrom:
                secretKeyRef:
                  name: atum-secrets
                  key: TMDB_API_KEY
          livenessProbe:
            exec:
              command: ["pgrep", "-f", "enrichment daemon"]
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          volumeMounts:
            - name: covers
              mountPath: /app/covers
            - name: library-music
              mountPath: /library/music
            - name: library-videos
              mountPath: /library/videos
          securityContext:
            capabilities:
              add: ["SYS_PTRACE"]
      volumes:
        - name: covers
          persistentVolumeClaim:
            claimName: api-covers
        - name: library-music
          persistentVolumeClaim:
            claimName: library-music
        - name: library-videos
          persistentVolumeClaim:
            claimName: library-videos
