apiVersion: v1
kind: ConfigMap
metadata:
  name: atum-config
  namespace: atum
data:
  # Paths de biblioteca (montados via PVC)
  LIBRARY_MUSIC_PATH: /library/music
  LIBRARY_VIDEOS_PATH: /library/videos
  COVERS_DIR: /app/covers

  # URLs dos indexadores
  X1337_BASE_URL: https://www.1377x.to
  TPB_BASE_URL: https://tpb.party
  TG_BASE_URL: https://torrentgalaxy.one
  YTS_BASE_URL: https://yts.lt
  EZTV_BASE_URL: https://eztv.re
  NYAA_BASE_URL: https://nyaa.si
  LIMETORRENTS_BASE_URL: https://www.limetorrents.lol
  TORLOCK_BASE_URL: https://www.torlock.com
  FITGIRL_BASE_URL: https://fitgirl-repacks.site
  RUTRACKER_BASE_URL: https://rutracker.org
  RARBG_BASE_URL: https://www.rarbgproxy.to
  EXT_BASE_URL: https://ext.to
  FLARESOLVERR_URL: http://flaresolverr.atum.svc.cluster.local:8191

  # URLs internas de serviços
  DOWNLOAD_RUNNER_URL: http://runner.atum.svc.cluster.local:9092

  # CORS — domínio real necessário para que allow_credentials=True funcione com BasicAuth
  CORS_ORIGINS: "https://atum.loombeat.com"

  # Tuning de workers
  SYNC_MAX_WORKERS: "8"
  ENRICHMENT_MAX_WORKERS: "8"

  # Timezone
  TZ: America/Sao_Paulo

  # ─── Phase 2: Storage / MinIO ────────────────────────────────────────────────
  # STORAGE_BACKEND: "minio" para S3-compatible, "local" para filesystem
  STORAGE_BACKEND: "minio"
  MINIO_ENDPOINT: "http://minio.atum.svc.cluster.local:9000"
  MINIO_REGION: "us-east-1"

  # ─── Phase 2: HLS Daemon ─────────────────────────────────────────────────────
  # Limita transcodificações paralelas por pod do hls-daemon
  HLS_MAX_CONCURRENT_JOBS: "2"

  # ─── Phase 2: Cloud Sync Daemon ──────────────────────────────────────────────
  # Dias sem reprodução para mover arquivo ao cold tier (cloud)
  COLD_TIER_DAYS: "90"
  # % de uso de disco que dispara o release de pressão
  STORAGE_PRESSURE_PCT: "85"
  # Janela de horário permitida para sync (vazio = sem restrição)
  CLOUD_SYNC_HOURS: ""
  # Quantidade de itens pré-baixados para uso offline
  PREFETCH_COUNT: "5"

  # ─── Phase 2: Auth ───────────────────────────────────────────────────────────
  # Tempo de expiração do access token (minutos)
  JWT_ACCESS_EXPIRE_MIN: "15"
  # Tempo de expiração do refresh token (dias)
  JWT_REFRESH_EXPIRE_DAYS: "30"
  # Habilitar registro público (false = somente por convite)
  REGISTRATION_OPEN: "false"
