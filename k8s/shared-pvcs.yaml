# PVCs compartilhados entre múltiplos pods (api, runner, sync-daemon, enrichment-daemon)
# K3s single-node: ReadWriteOnce é suficiente — múltiplos pods no mesmo nó podem
# montar o mesmo PVC ReadWriteOnce simultaneamente.
# Para cluster multi-nó: trocar para ReadWriteMany e configurar NFS/Longhorn/CephFS.
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: api-covers
  namespace: atum
  labels:
    app.kubernetes.io/name: atum
    app.kubernetes.io/component: shared-storage
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: library-music
  namespace: atum
  labels:
    app.kubernetes.io/name: atum
    app.kubernetes.io/component: shared-storage
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: library-videos
  namespace: atum
  labels:
    app.kubernetes.io/name: atum
    app.kubernetes.io/component: shared-storage
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 500Gi
