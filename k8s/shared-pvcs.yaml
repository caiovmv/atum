# PVCs compartilhados entre múltiplos pods (api, runner, sync-daemon, enrichment-daemon)
# K3s single-node: ReadWriteOnce é suficiente — múltiplos pods no mesmo nó podem
# montar o mesmo PVC ReadWriteOnce simultaneamente.
# Para cluster multi-nó: trocar para ReadWriteMany e configurar NFS/Longhorn/CephFS.
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: api-covers
  namespace: atum
  labels:
    app.kubernetes.io/name: atum
    app.kubernetes.io/component: shared-storage
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
# PVC único para toda a biblioteca de mídia.
# Subdiretórios: music/, videos/, series/, concerts/ (e futuros).
# Pods montam subpaths específicos via volumeMounts[].subPath.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: library
  namespace: atum
  labels:
    app.kubernetes.io/name: atum
    app.kubernetes.io/component: shared-storage
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Ti
---
# Cache de segmentos HLS gerados pelo FFmpeg (Phase 1 — HLS adaptativo).
# Montado apenas no pod da API em /app/hls_cache.
# Phase 2: mover para ReadWriteMany se a API for escalada horizontalmente.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hls-cache
  namespace: atum
  labels:
    app.kubernetes.io/name: atum
    app.kubernetes.io/component: hls-cache
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 200Gi
