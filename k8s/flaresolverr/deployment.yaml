apiVersion: apps/v1
kind: Deployment
metadata:
  name: flaresolverr
  namespace: atum
  labels:
    app.kubernetes.io/name: flaresolverr
    app.kubernetes.io/component: proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: flaresolverr
  template:
    metadata:
      labels:
        app.kubernetes.io/name: flaresolverr
        app.kubernetes.io/component: proxy
    spec:
      containers:
        - name: flaresolverr
          image: flaresolverr/flaresolverr:latest
          ports:
            - containerPort: 8191
              name: http
          env:
            - name: TZ
              valueFrom:
                configMapKeyRef:
                  name: atum-config
                  key: TZ
            - name: LOG_LEVEL
              value: info
          livenessProbe:
            httpGet:
              path: /
              port: 8191
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 8191
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
