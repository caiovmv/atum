# Build das imagens Docker, push para GHCR e deploy no Kubernetes.
# Triggers: push de tag v* ou workflow_dispatch manual.
#
# Secrets necessários (Settings → Secrets → Actions):
#   KUBECONFIG — conteúdo do arquivo kubeconfig do cluster de destino
#
# Requer: Settings → Actions → General → Workflow permissions = "Read and write permissions".

name: Build and push to GHCR

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag da imagem (ex.: v0.2.0)'
        required: true
        default: 'v0.2.0'

env:
  REGISTRY: ghcr.io
  OWNER: caiovmv

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/atum-api:${{ steps.tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/atum-api:latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build and push Runner
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/atum-runner:${{ steps.tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/atum-runner:latest
          cache-from: type=gha,scope=runner
          cache-to: type=gha,mode=max,scope=runner

      - name: Build and push Frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/atum-frontend:${{ steps.tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/atum-frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Build and push Enrichment
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.enrichment
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/atum-enrichment:${{ steps.tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/atum-enrichment:latest
          cache-from: type=gha,scope=enrichment
          cache-to: type=gha,mode=max,scope=enrichment

  deploy:
    name: Deploy to Kubernetes
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: KUBECONFIG
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Setup kubeconfig
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Verify cluster connection
        run: kubectl cluster-info

      - name: Update image tags via Kustomize
        run: |
          TAG=${{ steps.tag.outputs.tag }}
          cd k8s
          kustomize edit set image \
            ghcr.io/caiovmv/atum-api:${TAG} \
            ghcr.io/caiovmv/atum-runner:${TAG} \
            ghcr.io/caiovmv/atum-frontend:${TAG} \
            ghcr.io/caiovmv/atum-enrichment:${TAG}

      - name: Apply manifests
        run: kubectl apply -k k8s/

      - name: Wait for rollouts
        run: |
          kubectl rollout status deployment/api -n atum --timeout=180s
          kubectl rollout status deployment/runner -n atum --timeout=180s
          kubectl rollout status deployment/frontend -n atum --timeout=180s
          kubectl rollout status deployment/enrichment-daemon -n atum --timeout=120s
