# Build das imagens Docker e push para GHCR ao fazer push de uma tag v* (ex.: v0.2.0).
# Requer: Settings → Actions → General → Workflow permissions = "Read and write permissions".

name: Build and push to GHCR

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag da imagem (ex.: v0.2.0)'
        required: true
        default: 'v0.2.0'

env:
  REGISTRY: ghcr.io
  OWNER: caiovmv

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/atum-api:${{ steps.tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/atum-api:latest

      - name: Build and push Runner
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/atum-runner:${{ steps.tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/atum-runner:latest

      - name: Build and push Frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/atum-frontend:${{ steps.tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/atum-frontend:latest
