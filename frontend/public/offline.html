<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0a">
  <title>Atum — Offline</title>
  <style>
    :root {
      --atum-bg: #0a0a0a;
      --atum-card: #181818;
      --atum-border: #2a2a2a;
      --atum-text: #e5e5e5;
      --atum-text-muted: #a0a0a0;
      --atum-accent: #00e5c8;
      --atum-accent-hover: #00f5d4;
      --atum-accent-glow: rgba(0, 229, 200, 0.3);
      --atum-accent-dim: rgba(0, 229, 200, 0.15);
      --atum-accent-04: rgba(0, 229, 200, 0.04);
      --atum-text-on-accent: #000;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--atum-bg);
      color: var(--atum-text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 1.5rem;
    }
    .offline-card {
      text-align: center;
      max-width: 380px;
      padding: 2.5rem 2rem;
      background: var(--atum-card);
      border: 1px solid var(--atum-border);
      border-radius: 12px;
    }
    .offline-icon {
      font-family: 'Orbitron', system-ui, sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      color: var(--atum-accent);
      text-shadow: 0 0 8px var(--atum-accent-glow);
      margin-bottom: 1.5rem;
      padding: 0.5rem 1rem;
      border: 1px solid var(--atum-accent-dim);
      border-radius: 4px;
      display: inline-block;
      background: var(--atum-accent-04);
    }
    h1 {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }
    p {
      font-size: 0.85rem;
      color: var(--atum-text-muted);
      margin-bottom: 1.5rem;
      line-height: 1.5;
    }
    button {
      padding: 0.6rem 1.5rem;
      background: var(--atum-accent);
      color: var(--atum-text-on-accent);
      border: none;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      min-height: 44px;
    }
    button:hover { background: var(--atum-accent-hover); }
  </style>
</head>
<body>
  <div class="offline-card">
    <div class="offline-icon">SIGNAL LOST</div>
    <h1>Você está offline</h1>
    <p>Verifique sua conexão com a internet e tente novamente. O conteúdo em cache continua disponível.</p>
    <button onclick="window.location.reload()">Tentar novamente</button>
  </div>
</body>
</html>
