services:
  frontend:
    image: ghcr.io/caiovmv/atum-frontend:v0.2.0
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "80:80"
      - "443:443"
    environment:
      - BASIC_AUTH_USER=${BASIC_AUTH_USER:-}
      - BASIC_AUTH_PASS=${BASIC_AUTH_PASS:-}
    volumes:
      - nginx_certs:/etc/nginx/ssl
    healthcheck:
      test: ["CMD-SHELL", "curl -fk https://localhost:443/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    depends_on:
      api:
        condition: service_healthy
    networks:
      - dl-torrent
    restart: unless-stopped

  api:
    image: ghcr.io/caiovmv/atum-api:v0.2.0
    build:
      context: .
      dockerfile: Dockerfile
    cap_add:
      - SYS_PTRACE
    user: "0:0"
    entrypoint: ["/app/docker/entrypoint-api.sh"]
    command: [ "uvicorn", "app.web.app:app", "--host", "0.0.0.0", "--port", "8000" ]
    environment:
      - DATABASE_URL=postgresql://dluser:dlpass@postgres:5432/dltorrent
      - REDIS_URL=redis://redis:6379/0
      - DOWNLOAD_RUNNER_URL=http://runner:9092
      - LIBRARY_MUSIC_PATH=/library/music
      - LIBRARY_VIDEOS_PATH=/library/videos
      - TMDB_API_KEY=${TMDB_API_KEY:-}
      - COVERS_DIR=/app/covers
      - BASIC_AUTH_USER=${BASIC_AUTH_USER:-}
      - BASIC_AUTH_PASS=${BASIC_AUTH_PASS:-}
    volumes:
      - ${LIBRARY_MUSIC_PATH:-./data/music}:/library/music
      - ${LIBRARY_VIDEOS_PATH:-./data/videos}:/library/videos
      - api_covers:/app/covers
      - nginx_certs:/etc/nginx/ssl:ro
      - ./profiles:/profiles
    tmpfs:
      - /tmp:size=256M
    healthcheck:
      test: [ "CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/indexers/status')\" || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - dl-torrent
    restart: unless-stopped

  runner:
    image: ghcr.io/caiovmv/atum-runner:v0.2.0
    build:
      context: .
      dockerfile: Dockerfile
    cap_add:
      - SYS_PTRACE
    command: [ "uvicorn", "app.runner.app:app", "--host", "0.0.0.0", "--port", "9092" ]
    ports:
      # Portas BitTorrent (TCP + UDP) para aceitar conexões de entrada de peers e DHT
      - "6881-6889:6881-6889/tcp"
      - "6881-6889:6881-6889/udp"
    environment:
      - DATABASE_URL=postgresql://dluser:dlpass@postgres:5432/dltorrent
      - REDIS_URL=redis://redis:6379/0
      - LIBRARY_MUSIC_PATH=/library/music
      - LIBRARY_VIDEOS_PATH=/library/videos
      - COVERS_DIR=/app/covers
    volumes:
      - ${LIBRARY_MUSIC_PATH:-./data/music}:/library/music
      - ${LIBRARY_VIDEOS_PATH:-./data/videos}:/library/videos
      - api_covers:/app/covers
      - ./profiles:/profiles
    tmpfs:
      - /tmp:size=128G
    healthcheck:
      test: [ "CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:9092/downloads')\" || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - dl-torrent
    restart: unless-stopped

  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: dluser
      POSTGRES_PASSWORD: dlpass
      POSTGRES_DB: dltorrent
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=128MB"
      - "-c"
      - "effective_cache_size=384MB"
      - "-c"
      - "work_mem=4MB"
      - "-c"
      - "maintenance_work_mem=64MB"
      - "-c"
      - "wal_level=minimal"
      - "-c"
      - "max_wal_senders=0"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"
      - "-c"
      - "log_min_duration_statement=500"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/schema_postgres.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U dluser -d dltorrent" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - dl-torrent
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: [ "redis-server", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru", "--save", "60", "1000", "--appendonly", "yes" ]
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dl-torrent
    restart: unless-stopped

  feed-daemon:
    image: ghcr.io/caiovmv/atum-api:v0.2.0
    build:
      context: .
      dockerfile: Dockerfile
    cap_add:
      - SYS_PTRACE
    command: [ "dl-torrent", "feed", "daemon", "--interval", "30" ]
    environment:
      - DATABASE_URL=postgresql://dluser:dlpass@postgres:5432/dltorrent
      - REDIS_URL=redis://redis:6379/0
      - DOWNLOAD_RUNNER_URL=http://runner:9092
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      runner:
        condition: service_healthy
    volumes:
      - ./profiles:/profiles
    networks:
      - dl-torrent
    restart: unless-stopped

  sync-daemon:
    image: ghcr.io/caiovmv/atum-api:v0.2.0
    build:
      context: .
      dockerfile: Dockerfile
    cap_add:
      - SYS_PTRACE
    command: [ "dl-torrent", "sync", "daemon", "--interval", "300" ]
    environment:
      - DATABASE_URL=postgresql://dluser:dlpass@postgres:5432/dltorrent
      - REDIS_URL=redis://redis:6379/0
      - LIBRARY_MUSIC_PATH=/library/music
      - LIBRARY_VIDEOS_PATH=/library/videos
      - COVERS_DIR=/app/covers
      - TMDB_API_KEY=${TMDB_API_KEY:-}
      - TMDB_READ_ACCESS_TOKEN=${TMDB_READ_ACCESS_TOKEN:-}
      - SYNC_MAX_WORKERS=${SYNC_MAX_WORKERS:-8}
    volumes:
      - ${LIBRARY_MUSIC_PATH:-./data/music}:/library/music
      - ${LIBRARY_VIDEOS_PATH:-./data/videos}:/library/videos
      - api_covers:/app/covers
      - ./profiles:/profiles
    tmpfs:
      - /tmp:size=256M
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - dl-torrent
    restart: unless-stopped

  indexers-daemon:
    image: ghcr.io/caiovmv/atum-api:v0.2.0
    build:
      context: .
      dockerfile: Dockerfile
    cap_add:
      - SYS_PTRACE
    command: [ "dl-torrent", "indexers", "daemon", "--interval", "300" ]
    environment:
      - DATABASE_URL=postgresql://dluser:dlpass@postgres:5432/dltorrent
      - REDIS_URL=redis://redis:6379/0
      - X1337_BASE_URL=${X1337_BASE_URL:-https://www.1377x.to}
      - TPB_BASE_URL=${TPB_BASE_URL:-https://tpb.party}
      - YTS_BASE_URL=${YTS_BASE_URL:-https://yts.mx}
      - EZTV_BASE_URL=${EZTV_BASE_URL:-https://eztv.re}
      - NYAA_BASE_URL=${NYAA_BASE_URL:-https://nyaa.si}
      - LIMETORRENTS_BASE_URL=${LIMETORRENTS_BASE_URL:-https://www.limetorrents.lol}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./profiles:/profiles
    networks:
      - dl-torrent
    restart: unless-stopped

  enrichment-daemon:
    image: ghcr.io/caiovmv/atum-enrichment:v0.2.0
    build:
      context: .
      dockerfile: Dockerfile.enrichment
    cap_add:
      - SYS_PTRACE
    command: [ "dl-torrent", "enrichment", "daemon", "--interval", "300", "--batch-size", "10" ]
    environment:
      - DATABASE_URL=postgresql://dluser:dlpass@postgres:5432/dltorrent
      - REDIS_URL=redis://redis:6379/0
      - LIBRARY_MUSIC_PATH=/library/music
      - LIBRARY_VIDEOS_PATH=/library/videos
      - TMDB_API_KEY=${TMDB_API_KEY:-}
      - COVERS_DIR=/app/covers
      - ENRICHMENT_MAX_WORKERS=${ENRICHMENT_MAX_WORKERS:-5}
    volumes:
      - ${LIBRARY_MUSIC_PATH:-./data/music}:/library/music
      - ${LIBRARY_VIDEOS_PATH:-./data/videos}:/library/videos
      - api_covers:/app/covers
      - ./profiles:/profiles
    tmpfs:
      - /tmp:size=256M
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "pgrep -f 'enrichment daemon' || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - dl-torrent
    restart: unless-stopped

  ollama:
    image: ollama/ollama
    volumes:
      - ollama_models:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:11434/ || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - dl-torrent
    restart: unless-stopped
    profiles:
      - ai

  # FlareSolverr: contorna Cloudflare/reCAPTCHA nos scripts de scraping (scripts/scraping/).
  # No .env defina: FLARESOLVERR_URL=http://localhost:8191 (scripts no host) ou http://flaresolverr:8191 (de dentro do Docker).
  flaresolverr:
    image: flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    ports:
      - "8191:8191"
    environment:
      - TZ=America/Sao_Paulo
      - LOG_LEVEL=info
    networks:
      - dl-torrent

  # Cloudflare Tunnel. Profiles:
  #   cloudflare: tunnel apenas (docker compose --profile cloudflare up -d frontend cloudflared)
  #   android-build: tunnel + build APK (docker compose --profile android-build up -d frontend cloudflared)
  # --no-tls-verify: cert auto-assinado. Para validar, delete volume nginx_certs e use --origin-ca-pool.
  cloudflared:
    image: cloudflare/cloudflared:latest
    command: >
      tunnel --url https://frontend:443 --no-tls-verify
      --proxy-connect-timeout 60s --proxy-tls-timeout 30s
      --proxy-keepalive-timeout 90s --http2-origin
    depends_on:
      frontend:
        condition: service_healthy
    networks:
      - dl-torrent
    profiles:
      - cloudflare
      - android-build

  # Build APK: JDK 25 + Android SDK em volumes persistentes.
  # Uso: docker compose run --rm android-build <comando>
  # Primeira execucao instala JDK/SDK nos volumes; proximas reutilizam.
  android-build:
    build:
      context: .
      dockerfile: Dockerfile.android-build
    volumes:
      - android_build_jdk:/opt/jdk
      - android_build_sdk:/opt/android-sdk
      - android_build_bubblewrap:/root/.bubblewrap
      - .:/workspace
    environment:
      - JAVA_HOME=/opt/jdk
      - ANDROID_HOME=/opt/android-sdk
    networks:
      - dl-torrent
    profiles:
      - android-build

networks:
  dl-torrent:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  api_covers:
  nginx_certs:
  ollama_models:
  android_build_jdk:
  android_build_sdk:
  android_build_bubblewrap:
