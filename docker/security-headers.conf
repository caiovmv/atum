# HTTP Security Headers
# Incluído em todos os blocos location que definem add_header próprio,
# pois nginx não herda add_header do bloco pai nesses casos.
add_header X-Content-Type-Options    "nosniff"                             always;
add_header X-Frame-Options           "SAMEORIGIN"                          always;
add_header X-XSS-Protection          "1; mode=block"                       always;
add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;
add_header Permissions-Policy        "camera=(), microphone=(), geolocation=(), payment=()" always;
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://image.tmdb.org https://www.themoviedb.org; media-src 'self' blob:; connect-src 'self' wss: ws:; worker-src 'self' blob:; font-src 'self' data:; object-src 'none'; base-uri 'self'; frame-ancestors 'self';" always;
